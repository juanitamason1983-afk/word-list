<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- PWA 沉浸式全屏 Meta 标签 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Magic English - 单词森林大冒险</title>
    <style>
        /* 视觉系统 (保持高能量马卡龙风) */
        :root {
            --bg: #FFF9F2; --primary: #FF6B6B; --secondary: #4ECDC4; 
            --accent: #FFE66D; --white: #FFFFFF; --text: #2D3436;
        }

        body {
            margin: 0; font-family: 'Comic Sans MS', 'zcool-gdt', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center; height: 100vh; 
            overflow: hidden; -webkit-touch-callout: none;
        }

        #app {
            width: 100%; max-width: 450px; height: 100%;
            background: var(--white); position: relative; display: flex; flex-direction: column; overflow: hidden;
        }

        .header { padding: 40px 30px 10px; }
        .progress-box { width: 100%; height: 16px; background: #F0F0F0; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); transition: 0.6s; }
        
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .word-card { text-align: center; margin-bottom: 10px; }
        .syllables { font-size: 24px; color: var(--secondary); font-weight: bold; }
        .word-main { font-size: 56px; color: var(--primary); margin: 5px 0; }
        .meaning { font-size: 26px; color: #A0A0A0; }

        .stars-row { display: flex; gap: 15px; margin: 15px 0 25px 0; min-height: 50px;}
        .star { font-size: 45px; color: #EEE; transition: 0.3s; }
        .star.active { color: var(--accent); transform: scale(1.2) rotate(10deg); text-shadow: 0 0 15px var(--accent); }

        .mic-icon {
            width: 100px; height: 100px; border-radius: 50%;
            background: #F8F9FA; display: flex; align-items: center; justify-content: center;
            font-size: 45px; transition: 0.3s; margin-bottom: 10px; user-select: none;
        }
        .mic-icon.listening {
            background: var(--secondary); color: white;
            animation: pulse 1s infinite; box-shadow: 0 0 25px rgba(78,205,196,0.5);
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #praise-popup {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 60px; font-weight: 900; color: var(--accent); z-index: 100;
            text-shadow: 3px 3px 0 var(--primary); pointer-events: none; transition: 0.4s; text-align: center;
        }
        #praise-popup.animate { transform: translate(-50%, -50%) scale(1.2); }

        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .opt-btn {
            background: #FFF; border: 3px solid #F0F0F0; padding: 18px;
            border-radius: 20px; font-size: 20px; cursor: pointer; text-align: center; transition: 0.2s;
        }
        .opt-btn.correct { background: var(--secondary); color: white; border-color: var(--secondary); }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; padding: 30px;
        }
        .modal-card { background: var(--white); color: var(--text); padding: 30px; border-radius: 30px; width: 85%; max-width: 350px; }
        .modal-btn {
            background: var(--primary); color: white; border: none; padding: 12px 30px;
            border-radius: 50px; font-size: 18px; margin-top: 20px; cursor: pointer;
        }

        .spell-input {
            width: 80%; border: none; border-bottom: 5px solid var(--secondary);
            font-size: 40px; text-align: center; outline: none; margin-bottom: 25px; font-family: inherit;
        }

        .overlay {
            position: fixed; inset: 0; background: var(--primary); display: flex; 
            flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 1500;
        }

        /* 开发者模式按钮 */
        .dev-btn {
            position: fixed; bottom: 15px; right: 15px; background: rgba(0,0,0,0.1); color: #666;
            border: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; z-index: 9999; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header" id="header-area">
        <div class="progress-box"><div class="progress-bar" id="bar"></div></div>
        <div style="text-align: right; margin-top: 8px; font-size: 14px; color: #CCC;" id="progress-info">0/0</div>
    </div>

    <div class="game-area" id="game-view"></div>

    <div id="praise-popup">PERFECT!</div>

    <!-- 启动屏 -->
    <div id="start-screen" class="overlay">
        <div style="font-size: 80px; margin-bottom: 20px;">🦖</div>
        <h1 style="font-size: 32px;">超级单词闯关</h1>
        <p style="padding: 0 40px; text-align: center;">进入森林前，请点击按钮并<br><b>【允许麦克风权限】</b></p>
        <button onclick="bootApp()" style="background:white; color:var(--primary); border:none; padding:18px 50px; border-radius:50px; font-size:24px; font-weight:bold; margin-top:30px; cursor: pointer;">开启冒险v2.0</button>
    </div>

    <!-- 提示弹窗 -->
    <div id="msg-modal" class="modal">
        <div class="modal-card">
            <div id="modal-icon" style="font-size: 50px; margin-bottom: 10px;">⚠️</div>
            <h3 id="modal-title">提示</h3>
            <p id="modal-text" style="color: #666; line-height: 1.6; white-space: pre-wrap;">环境异常</p>
            <button class="modal-btn" onclick="closeModal()">好 的</button>
        </div>
    </div>
</div>

<button class="dev-btn" onclick="devNextDay()">测试：进入下一天 ⏭</button>

<script>
    /* =========================================
       1. 数据与艾宾浩斯复习算法 (LocalStorage)
       ========================================= */
    const ALL_WORDS =[
        { word: "gray", syllables: "gray", meaning: "灰色的" },
        { word: "duckling", syllables: "duck-ling", meaning: "小鸭子" },
        { word: "different", syllables: "dif-fer-ent", meaning: "不同的" },
        { word: "says", syllables: "says", meaning: "说" },
        { word: "little", syllables: "lit-tle", meaning: "小的" },
        { word: "another", syllables: "an-oth-er", meaning: "另外的" },
        { word: "pond", syllables: "pond", meaning: "池塘" },
        { word: "lovely", syllables: "love-ly", meaning: "可爱的" },
        { word: "summer", syllables: "sum-mer", meaning: "夏天" },
        { word: "farm", syllables: "farm", meaning: "农场" },
        { word: "ugly", syllables: "ug-ly", meaning: "丑的" },
        { word: "go away", syllables: "go a-way", meaning: "走开" },
        { word: "animals", syllables: "an-i-mals", meaning: "动物" },
        { word: "from the farm", syllables: "from the farm", meaning: "来自农场" },
        { word: "who", syllables: "who", meaning: "谁" },
        { word: "autumn", syllables: "au-tumn", meaning: "秋天" },
        { word: "winter", syllables: "win-ter", meaning: "冬天" },
        { word: "farmhouse", syllables: "farm-house", meaning: "农场房子" },
        { word: "give", syllables: "give", meaning: "给" },
        { word: "some", syllables: "some", meaning: "一些" },
        { word: "play with", syllables: "play with", meaning: "和...一起玩" },
        { word: "river", syllables: "riv-er", meaning: "河流" },
        { word: "hide", syllables: "hide", meaning: "躲起来" },
        { word: "spring", syllables: "spring", meaning: "春天" },
        { word: "swan", syllables: "swan", meaning: "天鹅" },
        { word: "where", syllables: "where", meaning: "哪里" },
        { word: "isn't", syllables: "is-n't", meaning: "不是" }
    ];

    const PRAISES =[
        { text: "WOW!", speech: "Wow!" }, { text: "AMAZING!", speech: "Amazing!" },
        { text: "PERFECT!", speech: "Perfect!" }, { text: "EXCELLENT!", speech: "Excellent!" },
        { text: "AWESOME!", speech: "Awesome!" }, { text: "SUPERSTAR!", speech: "You're a superstar!" }
    ];

    let currentDay = parseInt(localStorage.getItem('app_currentDay') || '1');
    let userProgress = JSON.parse(localStorage.getItem('app_userProgress') || '{}');
    
    let todayWords =[];
    let curIdx = 0;
    let curPhase = 1;
    let stars = 0;

    // --- iOS 麦克风核心状态管理 ---
    const SpeechConstructor = window.SpeechRecognition || window.webkitSpeechRecognition;
    let currentRecognition = null; 
    let isRecognizing = false;
    let isTransitioning = false;
    let lastMicTap = 0;

    // --- 极其严密的会话状态持久化 (为了防意外崩溃，我们依然保留存盘好习惯) ---
    function saveSession() {
        localStorage.setItem('app_session_day', currentDay);
        localStorage.setItem('app_session_curIdx', curIdx);
        localStorage.setItem('app_session_curPhase', curPhase);
        localStorage.setItem('app_session_stars', stars); 
    }

    function clearSession() {
        localStorage.removeItem('app_session_day');
        localStorage.removeItem('app_session_curIdx');
        localStorage.removeItem('app_session_curPhase');
        localStorage.removeItem('app_session_stars');
    }

    // 核心：每日任务分发器
    function generateDailyTasks() {
        let newQueue = [];
        let reviewQueue =[];
        let learnedBeforeTodayCount = 0;

        for (let wordStr in userProgress) {
            let progress = userProgress[wordStr];
            if (progress.firstLearnedDay < currentDay) {
                learnedBeforeTodayCount++;
                let age = currentDay - progress.firstLearnedDay;
                if (age > 0 && age <= 7) {
                    if (progress.lastReviewDay !== currentDay) {
                        let baseWord = ALL_WORDS.find(w => w.word === wordStr);
                        if (baseWord) {
                            let reqStars = (age <= 3) ? 3 : 1;
                            reviewQueue.push({ ...baseWord, requiredStars: reqStars, isNew: false });
                        }
                    }
                }
            }
        }
        
        for (let i = learnedBeforeTodayCount; i < learnedBeforeTodayCount + 10; i++) {
            if (ALL_WORDS[i]) {
                let w = ALL_WORDS[i].word;
                if (!userProgress[w] || userProgress[w].firstLearnedDay !== currentDay) { 
                    newQueue.push({ ...ALL_WORDS[i], requiredStars: 3, isNew: true });
                }
            }
        }
        
        todayWords =[...reviewQueue, ...newQueue];
    }

    function saveWordProgress(wordStr) {
        if (!userProgress[wordStr]) {
            userProgress[wordStr] = { firstLearnedDay: currentDay, reviews: 0, lastReviewDay: currentDay };
        } else {
            if (userProgress[wordStr].lastReviewDay !== currentDay) {
                userProgress[wordStr].reviews += 1;
                userProgress[wordStr].lastReviewDay = currentDay;
            }
        }
        localStorage.setItem('app_userProgress', JSON.stringify(userProgress));
    }

    function devNextDay() {
        localStorage.setItem('app_currentDay', currentDay + 1);
        clearSession(); 
        location.reload();
    }

    /* =========================================
       2. iOS 专属：静音清场 + 暴力超度 + 300ms延迟重启
       ========================================= */
    function bootApp() {
        if (!SpeechConstructor) {
            showModal("当前浏览器不支持录音", "建议使用 Chrome、Safari 或系统自带浏览器打开哦！", "❌");
            return;
        }

        window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
        document.getElementById('start-screen').style.display = 'none';
        
        generateDailyTasks();

        if (todayWords.length === 0) {
            showWin("太棒了！<br>你已学完全部单词，且今日打卡任务已清空！🎉");
            return;
        }
        render();
    }

    // 终极护盾：1.静音清场  2.暴力超度
    function cleanupSpeech() {
        try { window.speechSynthesis.cancel(); } catch(e) {}
        
        if (currentRecognition) {
            try { currentRecognition.abort(); } catch(e) {}
            currentRecognition = null;
        }
        isRecognizing = false;
        resetMicUI();
    }

    // 【完美单页延迟重建法】
    function startFreshRecognition() {
        if (!SpeechConstructor || curPhase !== 1 || isTransitioning) return;

        // 步骤 1 & 2：静音清场 + 彻底摧毁旧实例
        cleanupSpeech();

        // 步骤 3：给系统底层喘息时间，核心救命 300ms！
        setTimeout(() => {
            if (curPhase !== 1 || isTransitioning) return;

            // 再次双重确保超度干净
            if (currentRecognition) {
                try { currentRecognition.abort(); } catch (e) { }
                currentRecognition = null;
            }

            let recognition = new SpeechConstructor();
            currentRecognition = recognition;

            // 步骤 4：强制单次识别
            recognition.continuous = false;
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => { 
                isRecognizing = true; 
                document.getElementById('mic-box')?.classList.add('listening'); 
            };
            
            recognition.onresult = (e) => {
                if (curPhase !== 1 || isTransitioning) return;
                const result = e.results[0][0].transcript.toLowerCase();
                const target = todayWords[curIdx].word.toLowerCase();
                if (result.includes(target) || target.includes(result)) {
                    handleSuccess();
                } else {
                    renderFeedback("Try again!");
                    setTimeout(startStepLoop, 1200);
                }
            };

            recognition.onerror = (e) => {
                isRecognizing = false; 
                resetMicUI();

                // 彻底干掉报错弹窗，使用 abort 默默释放内存
                try { recognition.abort(); } catch(err) {}
                if (currentRecognition === recognition) currentRecognition = null;

                if (e.error === 'not-allowed') {
                    showModal("麦克风已准备好", "请再按一次麦克风开始录音！🎤\n(若始终不行，请在设置中允许权限)", "🎤");
                } else if (e.error === 'network') {
                    showModal("网络有点不稳定", "语音评分需要连接网络，请查网后重试~", "🌐");
                } else if (e.error === 'no-speech' && curPhase === 1 && !isTransitioning) {
                    // 没有听到声音，给予系统 300ms 缓冲后安全自动重试
                    setTimeout(startStepLoop, 300);
                }
                // aborted 等异常静默处理，保证 UI 是可恢复重点击状态
            };

            recognition.onend = () => { 
                isRecognizing = false; 
                resetMicUI(); 
                
                // 彻底释放
                try { recognition.abort(); } catch(err) {}
                if (currentRecognition === recognition) currentRecognition = null;
            };

            try {
                recognition.start();
            } catch (err) {
                console.warn("Recognition start failed:", err);
                isRecognizing = false; 
                resetMicUI();
                currentRecognition = null;
            }

        }, 300); 
    }

    function manualStartMic(e) {
        if (e && e.cancelable) e.preventDefault();
        const now = Date.now();
        if (now - lastMicTap < 800) return;
        lastMicTap = now;

        // 点击时会直接调用 startFreshRecognition，里面已经包含了 cancel、abort 和 300ms 的延迟！
        startFreshRecognition(); 
    }

    /* =========================================
       3. 核心互动与渲染逻辑 (彻底废弃 Reload)
       ========================================= */
    function startStepLoop() {
        if (curPhase !== 1 || isTransitioning) return;
        
        // 确保读音前清场
        cleanupSpeech();

        const wordAudio = highEnergySpeak(todayWords[curIdx].word);
        let audioFired = false;
        
        wordAudio.onend = () => {
            if(audioFired) return; audioFired = true;
            if (curPhase === 1 && !isTransitioning) startFreshRecognition();
        };
        
        setTimeout(() => { if (!audioFired) wordAudio.onend(); }, 2500);
        window.speechSynthesis.speak(wordAudio);
    }

    function handleSuccess() {
        if (isTransitioning) return;
        isTransitioning = true;
        
        stars++; // 每成功一次，星星直接 +1
        
        // 立刻闭麦清场，绝不允许边播表扬边开麦
        cleanupSpeech(); 
        
        const praiseObj = PRAISES[Math.floor(Math.random() * PRAISES.length)];
        renderFeedback(praiseObj.text);
        playDing();

        const praiseAudio = highEnergySpeak(praiseObj.speech, true);
        let audioFired = false;
        
        const nextStep = () => {
            if(audioFired) return; audioFired = true;
            isTransitioning = false;

            if (curPhase === 1) {
                if (stars < todayWords[curIdx].requiredStars) {
                    updateStars(); 
                    saveSession(); 
                    // [彻底废除 Reload，使用 SPA 无缝延迟进入下一拍]
                    setTimeout(startStepLoop, 400);
                } else {
                    curPhase = 2;
                    saveSession(); 
                    // [彻底废除 Reload，直接无刷新渲染下一环节]
                    render();
                }
            } else if (curPhase === 2) {
                curPhase = 3; 
                saveSession(); 
                render();      
            } else {
                saveWordProgress(todayWords[curIdx].word);
                curIdx++; 
                curPhase = 1;
                stars = 0; 
                saveSession(); 
                
                if (curIdx >= todayWords.length) {
                    clearSession(); 
                    showWin("太棒了！<br>你已完美完成今天的任务！🎉");
                } else {
                    render(); 
                }
            }
        };

        praiseAudio.onend = nextStep;
        setTimeout(nextStep, 2500);
        window.speechSynthesis.speak(praiseAudio);
    }

    function render() {
        isTransitioning = false; 
        cleanupSpeech(); 

        const view = document.getElementById('game-view');
        const wordObj = todayWords[curIdx];
        if (!wordObj) return;
        
        document.getElementById('bar').style.width = `${(curIdx / todayWords.length) * 100}%`;
        document.getElementById('progress-info').innerText = `第 ${currentDay} 天 | ${curIdx + 1} / ${todayWords.length} 词`;

        if (curPhase === 1) {
            let reqStars = wordObj.requiredStars;
            let starsHTML = '';
            for(let i=0; i<reqStars; i++) starsHTML += `<span class="star">★</span>`;
            
            let difficultyText = wordObj.isNew ? "✨ 今日新词学习" : (reqStars === 3 ? "🔥 强力记忆巩固" : "✅ 轻松复习过关");

            view.innerHTML = `
                <div style="font-size: 14px; color: var(--secondary); margin-bottom: 5px; font-weight:bold;">${difficultyText}</div>
                <div class="word-card">
                    <div class="syllables">${wordObj.syllables}</div>
                    <h1 class="word-main">${wordObj.word}</h1>
                    <div class="meaning">${wordObj.meaning}</div>
                </div>
                <div class="stars-row" id="star-row">${starsHTML}</div>
                <div class="mic-icon" id="mic-box" style="cursor:pointer;" onclick="manualStartMic(event)" ontouchstart="manualStartMic(event)">🎤</div>
                <p style="color:#CCC; font-size:14px; text-align:center;">APP读完后请跟读<br/>(没听清可点击麦克风重试)</p>
            `;
            
            // 恢复之前因为断网或刷新残留的星星数
            updateStars();
            startStepLoop();
        } 
        else if (curPhase === 2) {
            view.innerHTML = `
                <div class="mic-icon" style="background:var(--accent); cursor:pointer" onclick="repeatWord()">🔊</div>
                <h1 style="font-size:40px; margin: 20px 0;">? ? ?</h1>
                <div class="opt-grid" id="opt-box"></div>
            `;
            renderChoices(wordObj);
            repeatWord();
        } 
        else if (curPhase === 3) {
            view.innerHTML = `
                <div class="mic-icon" style="background:var(--accent); cursor:pointer" onclick="repeatWord()">🔊</div>
                <input type="text" id="speller" class="spell-input" placeholder="..." autocomplete="off">
                <button onclick="checkSpell()" style="background:var(--secondary); color:white; border:none; padding:15px 40px; border-radius:50px; font-size:22px; cursor:pointer">CHECK</button>
            `;
            repeatWord();
            setTimeout(() => document.getElementById('speller').focus(), 500);
        }
    }

    /* =========================================
       4. 基础辅助与 UI 函数
       ========================================= */
    function resetMicUI() {
        const mic = document.getElementById('mic-box');
        if (mic) mic.classList.remove('listening');
    }

    function highEnergySpeak(text, isPraise = false) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = isPraise ? 1.2 : 0.8; 
        utter.pitch = isPraise ? 1.4 : 1.0;
        return utter;
    }

    function repeatWord() {
        try { window.speechSynthesis.cancel(); } catch(e){}
        window.speechSynthesis.speak(highEnergySpeak(todayWords[curIdx].word));
    }

    function renderChoices(correct) {
        let choices =[correct];
        let available = ALL_WORDS.filter(x => x.word !== correct.word);
        available.sort(() => Math.random() - 0.5); 
        choices.push(...available.slice(0, 3));
        choices.sort(() => Math.random() - 0.5); 
        
        const box = document.getElementById('opt-box');
        choices.forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn'; btn.innerText = c.meaning;
            btn.onclick = () => {
                if(c.word === correct.word) {
                    btn.classList.add('correct'); handleSuccess();
                } else {
                    btn.style.borderColor = 'red'; repeatWord();
                }
            };
            box.appendChild(btn);
        });
    }

    function checkSpell() {
        const input = document.getElementById('speller');
        const val = input.value.toLowerCase().trim();
        if(val === todayWords[curIdx].word.toLowerCase()) {
            input.blur(); handleSuccess(); 
        } else {
            input.style.borderColor = 'red'; repeatWord();
        }
    }

    function updateStars() {
        const s = document.getElementById('star-row').querySelectorAll('.star');
        s.forEach((star, i) => { if(i < stars) star.classList.add('active'); });
    }

    function renderFeedback(txt) {
        const p = document.getElementById('praise-popup');
        p.innerText = txt; p.classList.add('animate');
        setTimeout(() => p.classList.remove('animate'), 800);
    }

    function playDing() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
            g.gain.setValueAtTime(0.05, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
    }

    function showModal(title, text, icon) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal-icon').innerText = icon;
        document.getElementById('msg-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('msg-modal').style.display = 'none'; }

    function showWin(msg) {
        cleanupSpeech();
        document.getElementById('header-area').style.display = 'none';
        const app = document.getElementById('game-view');
        app.innerHTML = `
            <div style="font-size: 80px; margin-bottom: 20px;">🏆</div>
            <h1 style="font-size: 28px; text-align:center; padding:0 20px; line-height: 1.5; color: var(--primary);">${msg}</h1>
            <p style="margin-top:20px; font-size: 20px; color:#A0A0A0">当前打卡天数: ${currentDay} 天</p>
            <button onclick="devNextDay()" style="background:var(--secondary); color:white; border:none; padding:18px 50px; border-radius:50px; font-size:20px; font-weight:bold; margin-top:40px; cursor:pointer;">开启明天的冒险</button>
        `;
    }

    // --- 页面初始化与挂载 ---
    function restoreSession() {
        const savedDay = localStorage.getItem('app_session_day');
        if (savedDay && parseInt(savedDay) === currentDay) {
            const savedPhase = localStorage.getItem('app_session_curPhase');
            const savedIdx = localStorage.getItem('app_session_curIdx');
            const savedStars = localStorage.getItem('app_session_stars');
            
            if (savedPhase !== null && savedIdx !== null) {
                curIdx = parseInt(savedIdx);
                curPhase = parseInt(savedPhase);
                stars = savedStars ? parseInt(savedStars) : 0; 
                
                document.getElementById('start-screen').style.display = 'none';
                generateDailyTasks();
                
                if (curIdx >= todayWords.length) {
                    clearSession();
                    showWin("太棒了！<br>你已学完全部单词，且今日打卡任务已清空！🎉");
                } else {
                    render(); 
                }
                return true;
            }
        }
        return false;
    }

    restoreSession();

</script>
</body>
</html>
