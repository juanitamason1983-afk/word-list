<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic English - 高能量单词王</title>
    <style>
        /* 
           =========================================
           1. 极致少儿视觉 & 动画设计
           =========================================
        */
        :root {
            --bg: #FFF9F2;
            --primary: #FF6B6B; /* 活力红 */
            --secondary: #4ECDC4; /* 清新绿 */
            --accent: #FFE66D; /* 能量黄 */
            --white: #FFFFFF;
            --text: #2D3436;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        @keyframes energeticPulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2) rotate(5deg); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        body {
            margin: 0; font-family: 'Comic Sans MS', 'zcool-gdt', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        #app {
            width: 100%; max-width: 450px; height: 90vh;
            background: var(--white); border-radius: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 顶部进度 */
        .header { padding: 30px 30px 10px; }
        .progress-box { width: 100%; height: 20px; background: #F0F0F0; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* 游戏主体 */
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .word-card { animation: bounceIn 0.8s; text-align: center; }
        .syllables { font-size: 26px; color: var(--secondary); font-weight: bold; margin-bottom: 5px; }
        .word-main { font-size: 64px; color: var(--primary); margin: 0; letter-spacing: 2px; }
        .meaning { font-size: 30px; color: #A0A0A0; margin-top: 10px; }

        /* 星星与反馈 */
        .stars-row { display: flex; gap: 15px; margin: 30px 0; }
        .star { font-size: 50px; color: #EEE; transition: 0.4s; }
        .star.active { color: var(--accent); transform: scale(1.3) rotate(15deg); text-shadow: 0 0 20px var(--accent); }

        .mic-icon {
            width: 110px; height: 110px; border-radius: 50%;
            background: #F8F9FA; display: flex; align-items: center; justify-content: center;
            font-size: 45px; transition: 0.3s; margin-bottom: 15px;
        }
        .mic-icon.listening {
            background: var(--secondary); color: white;
            animation: pulse 1s infinite; box-shadow: 0 0 30px rgba(78,205,196,0.5);
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 高能量文本弹窗 */
        #praise-popup {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 80px; font-weight: 900; color: var(--accent); z-index: 100;
            text-shadow: 4px 4px 0 var(--primary); pointer-events: none;
        }
        #praise-popup.animate { animation: energeticPulse 0.6s forwards; }

        /* 选项按钮 */
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .opt-btn {
            background: #FFF; border: 4px solid #F0F0F0; padding: 20px;
            border-radius: 25px; font-size: 22px; cursor: pointer; transition: 0.2s;
        }
        .opt-btn:active { transform: scale(0.95); }
        .opt-btn.correct { background: var(--secondary); border-color: var(--secondary); color: white; }

        /* 拼写 */
        .spell-input {
            width: 80%; border: none; border-bottom: 6px solid var(--secondary);
            font-size: 48px; text-align: center; outline: none; margin-bottom: 30px;
            color: var(--text); font-family: inherit;
        }

        /* 覆盖层 */
        .overlay {
            position: fixed; inset: 0; background: rgba(255,107,107,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 1000; text-align: center; padding: 40px;
        }

        canvas { position: absolute; inset: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="progress-box"><div class="progress-bar" id="bar"></div></div>
        <div style="text-align: right; margin-top: 10px; font-weight: bold; color: #CCC;" id="progress-info">0/0</div>
    </div>

    <div class="game-area" id="game-view">
        <!-- JS 注入内容 -->
    </div>

    <!-- 高能量文字特效 -->
    <div id="praise-popup">EXCELLENT!</div>

    <!-- 启动屏 -->
    <div id="start-screen" class="overlay">
        <div style="font-size: 100px; margin-bottom: 20px;">🎒</div>
        <h1 style="font-size: 40px;">超级单词森林</h1>
        <p style="font-size: 20px; margin-bottom: 40px;">点击下方按钮开启冒险<br>请在弹出提示时选择“允许麦克风”</p>
        <button onclick="bootApp()" style="background:white; color:var(--primary); border:none; padding:20px 60px; border-radius:50px; font-size:26px; font-weight:bold; cursor:pointer; box-shadow:0 10px 0 rgba(0,0,0,0.1);">出发吧！</button>
    </div>

    <!-- 胜利屏 -->
    <div id="win-screen" class="overlay" style="display:none; background:white; color:var(--text);">
        <h1 style="font-size: 50px; color:var(--primary);">🎉 YOU DID IT! 🎉</h1>
        <p style="font-size: 24px;">你获得了“今日单词之王”勋章！</p>
        <button onclick="location.reload()" style="background:var(--secondary); color:white; border:none; padding:15px 40px; border-radius:50px; font-size:22px; cursor:pointer; margin-top:30px;">明天继续挑战</button>
        <canvas id="fireworks"></canvas>
    </div>
</div>

<script>
    /* 
       =========================================
       2. 词库配置 (易于修改)
       =========================================
    */
    const WORDS = [
        { word: "apple", syllables: "ap-ple", meaning: "苹果" },
        { word: "banana", syllables: "ba-na-na", meaning: "香蕉" },
        { word: "elephant", syllables: "el-e-phant", meaning: "大象" },
        { word: "superman", syllables: "su-per-man", meaning: "超人" },
        { word: "wonderful", syllables: "won-der-ful", meaning: "美妙的" }
    ];

    /* 
       =========================================
       3. 核心引擎逻辑
       =========================================
    */
    let todayList = [];
    let curIdx = 0;
    let curPhase = 1; // 1:跟读, 2:选义, 3:拼写
    let stars = 0;
    let recognition;

    // A. 引导启动
    function bootApp() {
        document.getElementById('start-screen').style.display = 'none';
        initWordList();
        initRecognition();
        render();
    }

    // B. 高能量语音合成器 (赞美专用)
    function highEnergySpeak(text, isPraise = false) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        
        if (isPraise) {
            // 高能量设置：语速稍快，音调调高
            utter.rate = 1.2;
            utter.pitch = 1.4; 
            utter.volume = 1.0;
        } else {
            // 标准教学读音：慢速，清晰
            utter.rate = 0.8;
            utter.pitch = 1.0;
        }
        
        return utter;
    }

    // C. 语音识别初始化
    function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) {
            alert("请使用 Chrome 浏览器以支持语音识别");
            return;
        }
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        
        recognition.onresult = (e) => {
            const result = e.results[0][0].transcript.toLowerCase();
            const target = todayList[curIdx].word.toLowerCase();
            
            if (result.includes(target) || target.includes(result)) {
                handleSuccess();
            } else {
                renderFeedback("Try again!");
                setTimeout(startStepLoop, 1000);
            }
        };

        recognition.onend = () => {
            document.getElementById('mic-box').classList.remove('listening');
        };
    }

    // D. 成功后的连击反馈 (核心需求：高能量赞美)
    function handleSuccess() {
        stars++;
        
        // 1. 视觉特效
        renderFeedback(getRandomPraise());
        
        // 2. 播放叮当声 (合成音效)
        playDing();

        // 3. 高能量语音赞美
        const praises = ["Perfect!", "Amazing!", "You're a superstar!", "Excellent!", "Incredible!"];
        const praiseText = praises[Math.floor(Math.random() * praises.length)];
        const praiseAudio = highEnergySpeak(praiseText, true);
        
        praiseAudio.onend = () => {
            if (curPhase === 1) {
                if (stars < 3) {
                    updateStars();
                    setTimeout(startStepLoop, 800);
                } else {
                    curPhase = 2;
                    setTimeout(render, 500);
                }
            } else if (curPhase === 2) {
                curPhase = 3;
                render();
            } else {
                curIdx++;
                curPhase = 1;
                if (curIdx >= todayList.length) showWin();
                else render();
            }
        };
        
        window.speechSynthesis.speak(praiseAudio);
    }

    // E. 核心流程控制：听-说循环
    function startStepLoop() {
        if (curPhase !== 1) return;
        
        const wordAudio = highEnergySpeak(todayList[curIdx].word);
        
        // APP先读
        wordAudio.onend = () => {
            // 读完后自动开启麦克风
            document.getElementById('mic-box').classList.add('listening');
            recognition.start();
        };
        
        window.speechSynthesis.speak(wordAudio);
    }

    // F. 界面渲染
    function render() {
        const view = document.getElementById('game-view');
        const wordObj = todayList[curIdx];
        
        // 更新进度
        document.getElementById('bar').style.width = `${(curIdx / todayList.length) * 100}%`;
        document.getElementById('progress-info').innerText = `${curIdx + 1} / ${todayList.length}`;

        if (curPhase === 1) {
            stars = 0;
            view.innerHTML = `
                <div class="word-card">
                    <div class="syllables">${wordObj.syllables}</div>
                    <h1 class="word-main">${wordObj.word}</h1>
                    <div class="meaning">${wordObj.meaning}</div>
                </div>
                <div class="stars-row" id="star-row">
                    <span class="star">★</span><span class="star">★</span><span class="star">★</span>
                </div>
                <div class="mic-icon" id="mic-box">🎤</div>
                <p style="color:#CCC">听发音，跟读 3 次过关</p>
            `;
            startStepLoop();
        } 
        else if (curPhase === 2) {
            view.innerHTML = `
                <div class="mic-icon active" style="background:var(--accent); color:var(--text); cursor:pointer" onclick="repeatWord()">🔊</div>
                <h1 style="font-size:50px; margin-bottom:30px">? ? ?</h1>
                <div class="opt-grid" id="opt-box"></div>
            `;
            renderChoices(wordObj);
            repeatWord();
        }
        else if (curPhase === 3) {
            view.innerHTML = `
                <div class="mic-icon active" style="background:var(--accent); color:var(--text); cursor:pointer" onclick="repeatWord()">🔊</div>
                <input type="text" id="speller" class="spell-input" placeholder="..." autocomplete="off">
                <button onclick="checkSpell()" style="background:var(--secondary); color:white; border:none; padding:15px 50px; border-radius:50px; font-size:24px; cursor:pointer">CHECK</button>
            `;
            repeatWord();
        }
    }

    /* 辅助功能 */
    function renderChoices(correct) {
        let choices = [correct];
        while(choices.length < 4) {
            let r = WORDS[Math.floor(Math.random()*WORDS.length)];
            if(!choices.find(x => x.word === r.word)) choices.push(r);
        }
        choices.sort(() => Math.random() - 0.5);
        const box = document.getElementById('opt-box');
        choices.forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'opt-btn';
            btn.innerText = c.meaning;
            btn.onclick = () => {
                if(c.word === correct.word) {
                    btn.classList.add('correct');
                    handleSuccess();
                } else {
                    btn.style.borderColor = 'red';
                    repeatWord();
                }
            };
            box.appendChild(btn);
        });
    }

    function checkSpell() {
        const val = document.getElementById('speller').value.toLowerCase().trim();
        if(val === todayList[curIdx].word.toLowerCase()) {
            handleSuccess();
        } else {
            document.getElementById('speller').style.borderColor = 'red';
            repeatWord();
        }
    }

    function repeatWord() {
        window.speechSynthesis.speak(highEnergySpeak(todayList[curIdx].word));
    }

    function updateStars() {
        const s = document.getElementById('star-row').querySelectorAll('.star');
        s.forEach((star, i) => { if(i < stars) star.classList.add('active'); });
    }

    function renderFeedback(txt) {
        const p = document.getElementById('praise-popup');
        p.innerText = txt;
        p.classList.add('animate');
        setTimeout(() => p.classList.remove('animate'), 600);
    }

    function getRandomPraise() {
        return ["AWESOME!", "PERFECT!", "COOL!", "WOW!", "GREAT!"][Math.floor(Math.random()*5)];
    }

    function playDing() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
    }

    function initWordList() {
        // 模拟 7 天循环：这里简化逻辑，实际会根据 localStorage 首次学习时间过滤
        todayList = WORDS.slice(0, 10);
    }

    function showWin() {
        document.getElementById('win-screen').style.display = 'flex';
        // 简单彩屑效果
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = Array.from({length:80}, () => ({
            x: canvas.width/2, y: canvas.height/2,
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            c: `hsl(${Math.random()*360}, 100%, 50%)`
        }));
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.1;
                ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 5, 5);
            });
            requestAnimationFrame(anim);
        }
        anim();
    }

</script>
</body>
</html>
